<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для Тебя ❤️</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
</head>
<body>
    <!-- Background Canvas and Ambient Layers -->
    <canvas id="webgl-canvas"></canvas>
    <div id="fog"></div>
    <div class="cursor-glow"></div>
    <div id="particles-dom"></div>

    <!-- Controls -->
    <button id="music-toggle" class="glass-btn">🎵</button>
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/04/27/audio_67bcf729ec.mp3?filename=ambient-piano-amp-strings-10711.mp3" type="audio/mpeg">
    </audio>

    <!-- SCENE 1: Intro -->
    <div id="scene-intro" class="scene active">
        <div class="intro-content">
            <div id="click-target" class="interactive-heart-zone"></div>
            <p class="intro-text">Нажми чтобы открыть</p>
        </div>
    </div>

    <!-- SCENE 3: Message Appearance -->
    <div id="scene-message" class="scene hidden">
        <div class="glass-panel">
            <div id="message-text"></div>
            <button id="btn-continue" class="glass-btn primary-btn hidden-btn">Продолжить</button>
        </div>
    </div>

    <!-- SCENE 4: Final Moment -->
    <div id="scene-final" class="scene hidden">
        <div class="final-content">
            <h1 class="final-text">Я люблю тебя ❤️</h1>
            <button id="btn-restart" class="glass-btn primary-btn">Перечитать снова</button>
        </div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
